<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Dido OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:manipulation;font-family:Arial,sans-serif;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}
#face{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;position:relative}
#eyes{display:flex;gap:10vw;align-items:center;justify-content:center;margin-top:-10vh}
.eye{width:30vw;height:30vw;max-width:170px;max-height:170px;background:radial-gradient(circle,#0a0a14 35%,#050508 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;border:2.5px solid rgba(0,220,255,0.5);box-shadow:0 0 30px rgba(0,220,255,0.15),inset 0 0 25px rgba(0,0,0,0.6);transition:all 0.5s ease}
.iris{width:62%;height:62%;background:radial-gradient(circle at 30% 30%,#00e5ff,#0099bb,#006677);border-radius:50%;position:relative;transition:all 0.4s ease;box-shadow:0 0 20px rgba(0,229,255,0.4),inset 0 0 8px rgba(255,255,255,0.08);animation:irisBreath 4s ease-in-out infinite}
@keyframes irisBreath{0%,100%{box-shadow:0 0 20px rgba(0,229,255,0.4)}50%{box-shadow:0 0 30px rgba(0,229,255,0.6)}}
.pupil{width:35%;height:35%;background:radial-gradient(circle,#000 60%,#111);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.4s ease}
.iris-glow{position:absolute;width:28%;height:28%;background:radial-gradient(circle,rgba(255,255,255,0.95),rgba(255,255,255,0));border-radius:50%;top:16%;left:16%}
.iris-glow2{position:absolute;width:12%;height:12%;background:rgba(255,255,255,0.7);border-radius:50%;bottom:22%;right:20%}
.eyelid-top,.eyelid-bottom{position:absolute;width:110%;height:55%;background:#000;z-index:2;transition:transform 0.2s ease-in-out}
.eyelid-top{top:-2%;left:-5%;border-radius:0 0 50% 50%;transform:translateY(-100%)}
.eyelid-bottom{bottom:-2%;left:-5%;border-radius:50% 50% 0 0;transform:translateY(100%)}
.blink .eyelid-top{transform:translateY(0)!important}
.blink .eyelid-bottom{transform:translateY(0)!important}
.happy .iris{background:radial-gradient(circle at 30% 30%,#4dff88,#00cc55,#009940);box-shadow:0 0 25px rgba(0,255,100,0.5);transform:scale(1.1)}
.happy .pupil{transform:translate(-50%,-50%) scale(1.15)}
.happy .eye,.happy.eye{border-color:rgba(0,255,100,0.6);box-shadow:0 0 30px rgba(0,255,100,0.25),inset 0 0 20px rgba(0,0,0,0.5)}
.happy .eyelid-top{transform:translateY(-75%)!important}
.happy .eyelid-bottom{transform:translateY(70%)!important}
.sad .iris{background:radial-gradient(circle at 30% 30%,#6688ff,#3355cc,#2244aa);box-shadow:0 0 20px rgba(80,120,255,0.5);transform:translateY(15%) scale(0.9)}
.sad .pupil{transform:translate(-50%,-50%) scale(1.1)}
.sad .eye,.sad.eye{border-color:rgba(80,120,255,0.5);box-shadow:0 0 25px rgba(80,120,255,0.2),inset 0 0 20px rgba(0,0,0,0.5)}
.sad .eyelid-top{transform:translateY(-55%)!important}
.angry .iris{background:radial-gradient(circle at 30% 30%,#ff3333,#cc0000,#880000);box-shadow:0 0 25px rgba(255,0,0,0.6);transform:scale(0.92)}
.angry .pupil{transform:translate(-50%,-50%) scale(0.7)}
.angry .eye,.angry.eye{border-color:rgba(255,50,50,0.7);box-shadow:0 0 35px rgba(255,0,0,0.3),inset 0 0 20px rgba(0,0,0,0.5)}
.angry .eyelid-top{transform:translateY(-50%) rotate(12deg)!important}
.angry .eye:first-child .eyelid-top,.eye:first-child.angry .eyelid-top{transform:translateY(-50%) rotate(-12deg)!important}
.surprised .iris{background:radial-gradient(circle at 30% 30%,#ffee44,#ffcc00,#cc9900);box-shadow:0 0 30px rgba(255,220,0,0.5);transform:scale(1.3)}
.surprised .pupil{transform:translate(-50%,-50%) scale(0.55)}
.surprised .eye,.surprised.eye{border-color:rgba(255,220,0,0.6);box-shadow:0 0 35px rgba(255,220,0,0.25),inset 0 0 20px rgba(0,0,0,0.5)}
.thinking .iris{background:radial-gradient(circle at 30% 30%,#cc77ff,#9933ff,#6600cc);box-shadow:0 0 20px rgba(150,50,255,0.4);transform:translateX(25%) translateY(-20%)}
.thinking .eye,.thinking.eye{border-color:rgba(150,50,255,0.5);box-shadow:0 0 25px rgba(150,50,255,0.2),inset 0 0 20px rgba(0,0,0,0.5)}
.thinking .eyelid-bottom{transform:translateY(75%)!important}
.sleepy .iris{background:radial-gradient(circle at 30% 30%,#556688,#334466,#223355);box-shadow:0 0 10px rgba(80,100,140,0.3);transform:translateY(10%) scale(0.88)}
.sleepy .eye,.sleepy.eye{border-color:rgba(80,100,140,0.3);box-shadow:0 0 15px rgba(80,100,140,0.1),inset 0 0 20px rgba(0,0,0,0.6)}
.sleepy .eyelid-top{transform:translateY(-35%)!important}
.love .iris{background:radial-gradient(circle at 30% 30%,#ff66aa,#ff0077,#cc0055);box-shadow:0 0 25px rgba(255,0,120,0.5);transform:scale(1.12);animation:lovePulse 1s ease-in-out infinite}
.love .pupil{transform:translate(-50%,-50%) scale(1.2)}
.love .eye,.love.eye{border-color:rgba(255,0,120,0.5);box-shadow:0 0 30px rgba(255,0,120,0.25),inset 0 0 20px rgba(0,0,0,0.5)}
.love .eyelid-top{transform:translateY(-70%)!important}
.love .eyelid-bottom{transform:translateY(75%)!important}
@keyframes lovePulse{0%,100%{box-shadow:0 0 25px rgba(255,0,120,0.5)}50%{box-shadow:0 0 40px rgba(255,0,120,0.7)}}
.excited .iris{background:radial-gradient(circle at 30% 30%,#ffdd00,#ffaa00,#dd8800);box-shadow:0 0 30px rgba(255,200,0,0.6);transform:scale(1.2)}
.excited .pupil{transform:translate(-50%,-50%) scale(1.25)}
.excited .eye,.excited.eye{border-color:rgba(255,200,0,0.6);box-shadow:0 0 35px rgba(255,200,0,0.3),inset 0 0 20px rgba(0,0,0,0.5);animation:excitedBounce 0.5s infinite alternate}
@keyframes excitedBounce{0%{transform:translateY(0)}100%{transform:translateY(-4px)}}
.laughing .iris{background:radial-gradient(circle at 30% 30%,#66ff66,#00dd44,#00aa33);box-shadow:0 0 25px rgba(0,255,80,0.5);transform:scale(1.05)}
.laughing .eyelid-top{transform:translateY(-35%)!important}
.laughing .eyelid-bottom{transform:translateY(55%)!important}
.laughing .eye,.laughing.eye{border-color:rgba(0,255,80,0.5);box-shadow:0 0 30px rgba(0,255,80,0.25),inset 0 0 20px rgba(0,0,0,0.5);animation:laughShake 0.12s infinite alternate}
@keyframes laughShake{0%{transform:rotate(-2deg)}100%{transform:rotate(2deg)}}
.worried .iris{background:radial-gradient(circle at 30% 30%,#ffaa44,#ff8800,#cc6600);box-shadow:0 0 20px rgba(255,150,0,0.4);transform:translateY(8%) scale(0.95)}
.worried .eye,.worried.eye{border-color:rgba(255,150,0,0.5);box-shadow:0 0 25px rgba(255,150,0,0.2),inset 0 0 20px rgba(0,0,0,0.5);animation:worryTremble 0.3s infinite alternate}
.worried .eyelid-top{transform:translateY(-60%) rotate(6deg)!important}
.worried .eye:first-child .eyelid-top,.eye:first-child.worried .eyelid-top{transform:translateY(-60%) rotate(-6deg)!important}
@keyframes worryTremble{0%{transform:translateX(-1px)}100%{transform:translateX(1px)}}
.confused .iris{background:radial-gradient(circle at 30% 30%,#ffbb44,#ff9900,#cc7700);box-shadow:0 0 20px rgba(255,170,0,0.4);transform:translateX(20%) scale(1.02)}
.confused .eye,.confused.eye{border-color:rgba(255,170,0,0.5);box-shadow:0 0 25px rgba(255,170,0,0.2),inset 0 0 20px rgba(0,0,0,0.5)}
.confused .eye:first-child .iris,.eye:first-child.confused .iris{transform:translateX(-20%) translateY(-10%) scale(1.02)}
#mouth{margin-top:6vh;width:8vw;max-width:50px;height:3px;background:rgba(0,220,255,0.6);border-radius:10px;transition:all 0.4s;box-shadow:0 0 10px rgba(0,220,255,0.3)}
.happy #mouth{width:14vw;height:2.5vw;max-height:14px;border-radius:0 0 50% 50%;background:rgba(0,255,100,0.7);box-shadow:0 0 15px rgba(0,255,100,0.4)}
.sad #mouth{width:10vw;height:2vw;max-height:10px;border-radius:50% 50% 0 0;background:rgba(80,120,255,0.7);box-shadow:0 0 10px rgba(80,120,255,0.4)}
.angry #mouth{width:12vw;height:1.2vw;background:rgba(255,50,50,0.8);box-shadow:0 0 15px rgba(255,0,0,0.4)}
.surprised #mouth{width:6vw;height:6vw;max-width:35px;max-height:35px;border-radius:50%;background:transparent;border:2px solid rgba(255,220,0,0.7);box-shadow:0 0 15px rgba(255,220,0,0.3)}
.excited #mouth{width:12vw;height:3vw;max-height:18px;border-radius:0 0 50% 50%;background:rgba(255,200,0,0.7);box-shadow:0 0 15px rgba(255,200,0,0.4)}
.laughing #mouth{width:16vw;height:4vw;max-height:22px;border-radius:0 0 50% 50%;background:rgba(0,255,80,0.7);box-shadow:0 0 15px rgba(0,255,80,0.4);animation:laughMouth 0.15s infinite alternate}
@keyframes laughMouth{0%{height:3vw}100%{height:5vw}}
.worried #mouth{width:8vw;height:1.5vw;border-radius:40%;background:rgba(255,150,0,0.6);transform:rotate(-5deg)}
.confused #mouth{width:8vw;height:1.5vw;border-radius:40%;background:rgba(255,170,0,0.6);transform:rotate(8deg)}
.love #mouth{width:12vw;height:2.5vw;max-height:14px;border-radius:0 0 50% 50%;background:rgba(255,0,120,0.7);box-shadow:0 0 15px rgba(255,0,120,0.4)}
.thinking #mouth{width:6vw;height:1px;background:rgba(150,50,255,0.5)}
.sleepy #mouth{width:6vw;height:1px;background:rgba(80,100,140,0.4)}
.speaking #mouth{animation:speak 0.3s infinite alternate}
@keyframes speak{0%{height:1vw;width:6vw}100%{height:4vw;width:10vw;border-radius:40%}}
#status{position:fixed;bottom:5vh;color:rgba(0,220,255,0.5);font-size:3vw;text-align:center;padding:0 5vw;max-width:90%;text-shadow:0 0 8px rgba(0,220,255,0.3);transition:all 0.5s}
#listening-indicator{position:fixed;bottom:12vh;width:15vw;height:15vw;max-width:70px;max-height:70px;border-radius:50%;border:2px solid #f00;display:none;animation:pulse 1s infinite;background:rgba(255,0,0,0.1)}
@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.5}100%{transform:scale(1);opacity:1}}
#text-input-wrap{position:fixed;bottom:2vh;width:90%;max-width:400px;display:none;z-index:50}
#text-input{width:100%;padding:12px 16px;border:2px solid rgba(0,220,255,0.5);border-radius:25px;background:rgba(0,15,20,0.9);color:#0ff;font-size:16px;outline:none}
#text-input::placeholder{color:rgba(0,220,255,0.3)}
#thinking-dots{display:none;position:fixed;bottom:18vh}
#thinking-dots span{display:inline-block;width:2.5vw;height:2.5vw;max-width:12px;max-height:12px;margin:0 1.2vw;background:#a0f;border-radius:50%;animation:dotPulse 1.4s infinite}
#thinking-dots span:nth-child(2){animation-delay:0.2s}
#thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(0.6);opacity:0.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="face">
<div id="eyes">
<div class="eye" id="eye-l"><div class="eyelid-top"></div><div class="iris"><div class="pupil"></div><div class="iris-glow"></div><div class="iris-glow2"></div></div><div class="eyelid-bottom"></div></div>
<div class="eye" id="eye-r"><div class="eyelid-top"></div><div class="iris"><div class="pupil"></div><div class="iris-glow"></div><div class="iris-glow2"></div></div><div class="eyelid-bottom"></div></div>
</div>
<div id="mouth"></div>
</div>
<div id="thinking-dots"><span></span><span></span><span></span></div>
<div id="listening-indicator"></div>
<div id="status"></div>
<div id="text-input-wrap"><input id="text-input" type="text" placeholder="Escribe algo a Dido..." autocomplete="off"></div>
<script>
var $=function(id){return document.getElementById(id)};
var face=$('face'),status=$('status'),eyes=[$('eye-l'),$('eye-r')];
var thinkDots=$('thinking-dots'),listenInd=$('listening-indicator');
var textWrap=$('text-input-wrap'),textIn=$('text-input');
var speaking=false,listening=false,wakeListening=false,wakeLock=null;
var inConversation=false,convoTimeout=null;
var longPressTimer=null,recognition=null,wakeRecognition=null,voices=[];
var WAKE_WORDS=['dido','oye dido','hey dido','ei dido','ey dido'];

startBlink();startIdle();startWakeListener();

function requestWake(){try{if('wakeLock' in navigator){navigator.wakeLock.request('screen').then(function(w){wakeLock=w}).catch(function(){})}}catch(e){}}
requestWake();
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'){requestWake();if(!wakeListening&&!listening&&!speaking)startWakeListener()}});

function goFull(){var d=document.documentElement;if(d.requestFullscreen)d.requestFullscreen();else if(d.webkitRequestFullscreen)d.webkitRequestFullscreen()}

function blink(){eyes.forEach(function(e){e.classList.add('blink')});setTimeout(function(){eyes.forEach(function(e){e.classList.remove('blink')})},150)}
function startBlink(){setInterval(function(){if(!speaking)blink()},3000+Math.random()*4000)}

function startIdle(){setInterval(function(){if(speaking||listening)return;var ir=document.querySelectorAll('.iris');var x=(Math.random()-0.5)*25,y=(Math.random()-0.5)*15;ir.forEach(function(i){i.style.transform='translate('+x+'%,'+y+'%)'});setTimeout(function(){ir.forEach(function(i){var cl=i.parentElement.parentElement.classList;if(!cl.contains('thinking')&&!cl.contains('confused'))i.style.transform='translate(0,0)'})},2000)},4000+Math.random()*3000)}

var ALL_EXPR=['happy','sad','angry','surprised','thinking','sleepy','love','excited','worried','confused','laughing','neutral','speaking'];
function setExpression(expr){ALL_EXPR.forEach(function(x){face.classList.remove(x);eyes.forEach(function(e){e.classList.remove(x)})});if(expr&&expr!=='neutral'){face.classList.add(expr);eyes.forEach(function(e){e.classList.add(expr)})}}

function loadVoices(){voices=speechSynthesis.getVoices()}
speechSynthesis.onvoiceschanged=loadVoices;loadVoices();

function pickVoice(){if(!voices.length)voices=speechSynthesis.getVoices();var prefs=['Google español','Microsoft Pablo','Jorge','Carlos','Diego'];for(var p=0;p<prefs.length;p++){for(var v=0;v<voices.length;v++){if(voices[v].name.indexOf(prefs[p])>=0&&voices[v].lang.indexOf('es')===0)return voices[v]}}for(var v=0;v<voices.length;v++){if(voices[v].lang.indexOf('es')===0)return voices[v]}return null}

function speak(text,emotion){return new Promise(function(resolve){
speechSynthesis.cancel();
var u=new SpeechSynthesisUtterance(text);
u.lang='es-ES';u.rate=1.0;u.pitch=0.85;u.volume=1.0;
var v=pickVoice();if(v)u.voice=v;
speaking=true;setExpression(emotion||'happy');
face.classList.add('speaking');status.textContent=text;
u.onend=function(){
speaking=false;face.classList.remove('speaking');
inConversation=true;
if(convoTimeout)clearTimeout(convoTimeout);
convoTimeout=setTimeout(function(){inConversation=false;setExpression('neutral');status.textContent='';startWakeListener()},15000);
setTimeout(function(){setExpression('neutral');status.textContent='';startListening()},800);
resolve()};
u.onerror=function(){speaking=false;face.classList.remove('speaking');setExpression('neutral');startWakeListener();resolve()};
speechSynthesis.speak(u)})}

function initSTT(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){return}
recognition=new SR();recognition.lang='es-ES';recognition.continuous=false;recognition.interimResults=false;recognition.maxAlternatives=3;
recognition.onresult=function(e){var t=e.results[0][0].transcript;stopListening();if(convoTimeout)clearTimeout(convoTimeout);processInput(t)};
recognition.onerror=function(e){stopListening();
if(e.error==='no-speech'){
if(inConversation){inConversation=false;setExpression('neutral');status.textContent='';startWakeListener()}
else{startWakeListener()}
}else if(e.error!=='aborted'){status.textContent='';setExpression('confused');setTimeout(function(){setExpression('neutral');startWakeListener()},2000)}
else{startWakeListener()}};
recognition.onend=function(){if(listening){stopListening();if(inConversation){setTimeout(function(){if(!speaking&&!listening){startListening()}},500)}else{startWakeListener()}}}}
initSTT();

function startListening(){if(!recognition||speaking)return;stopWakeListener();try{listening=true;listenInd.style.display='block';setExpression('neutral');recognition.start()}catch(e){stopListening();startWakeListener()}}
function stopListening(){listening=false;listenInd.style.display='none';try{recognition.stop()}catch(e){}}

function processInput(text){
status.textContent='"'+text+'"';setExpression('thinking');thinkDots.style.display='block';
var controller=new AbortController();
var timer=setTimeout(function(){controller.abort()},12000);
fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text}),signal:controller.signal}).then(function(r){return r.json()}).then(function(data){clearTimeout(timer);thinkDots.style.display='none';speak(data.reply,data.emotion)}).catch(function(){clearTimeout(timer);thinkDots.style.display='none';speak('Tuve un problema de conexion. Intenta de nuevo.','sad')})}

function initWakeListener(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
wakeRecognition=new SR();wakeRecognition.lang='es-ES';wakeRecognition.continuous=true;wakeRecognition.interimResults=true;wakeRecognition.maxAlternatives=5;
wakeRecognition.onresult=function(e){for(var i=e.resultIndex;i<e.results.length;i++){var t=e.results[i][0].transcript.toLowerCase().trim();var wakeDetected=false;var command='';for(var w=0;w<WAKE_WORDS.length;w++){if(t.indexOf(WAKE_WORDS[w])>=0){wakeDetected=true;var idx=t.indexOf(WAKE_WORDS[w])+WAKE_WORDS[w].length;command=t.substring(idx).trim();break}}if(wakeDetected){stopWakeListener();setExpression('excited');blink();if(command.length>3&&e.results[i].isFinal){status.textContent='';processInput(command)}else{speak('Dime!','happy').then(function(){startListening()})}return}}};
wakeRecognition.onerror=function(e){wakeListening=false;if(e.error!=='aborted'&&e.error!=='no-speech'&&e.error!=='not-allowed'){setTimeout(function(){startWakeListener()},2000)}};
wakeRecognition.onend=function(){if(wakeListening&&!listening&&!speaking){setTimeout(function(){if(!listening&&!speaking){try{wakeRecognition.start()}catch(e){setTimeout(function(){startWakeListener()},1000)}}},500)}}}
initWakeListener();

function startWakeListener(){if(!wakeRecognition||speaking||listening)return;try{stopWakeListener();setTimeout(function(){try{wakeListening=true;wakeRecognition.start()}catch(e){wakeListening=false}},300)}catch(e){wakeListening=false}}

function stopWakeListener(){wakeListening=false;try{wakeRecognition.stop()}catch(e){}}

document.addEventListener('touchstart',function(e){if(e.target===textIn)return;goFull();longPressTimer=setTimeout(function(){textWrap.style.display=textWrap.style.display==='block'?'none':'block';if(textWrap.style.display==='block')textIn.focus();longPressTimer=null},800)},{passive:true});

document.addEventListener('touchend',function(e){if(e.target===textIn)return;if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}},{passive:true});

textIn.addEventListener('keydown',function(e){if(e.key==='Enter'){var t=textIn.value.trim();if(t){textIn.value='';textWrap.style.display='none';stopWakeListener();processInput(t)}}});
</script>
</body>
</html>
