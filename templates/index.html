<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Dido OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:manipulation;font-family:Arial,sans-serif;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}
#boot{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
#boot-text{font-size:15vw;font-weight:900;color:#0ff;opacity:0;animation:bootIn 2s forwards;text-shadow:0 0 40px #0ff,0 0 80px #0ff}
#boot-sub{font-size:3vw;color:#0ff;opacity:0;margin-top:2vh;animation:bootSub 1.5s 1.5s forwards}
@keyframes bootIn{0%{opacity:0;transform:scale(0.3)}50%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes bootSub{0%{opacity:0}100%{opacity:0.6}}
#face{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;position:relative}
#eyes{display:flex;gap:12vw;align-items:center;justify-content:center;margin-top:-10vh}
.eye{width:28vw;height:28vw;max-width:160px;max-height:160px;background:radial-gradient(circle,#111 40%,#0a0a0a 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;border:3px solid #0ff;box-shadow:0 0 20px rgba(0,255,255,0.3);transition:all 0.4s ease}
.iris{width:55%;height:55%;background:radial-gradient(circle at 35% 35%,#0ff,#0088aa);border-radius:50%;position:relative;transition:all 0.3s ease;box-shadow:0 0 15px #0ff}
.pupil{width:40%;height:40%;background:#000;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.3s}
.iris-glow{position:absolute;width:25%;height:25%;background:rgba(255,255,255,0.8);border-radius:50%;top:22%;left:22%}
.eyelid-top,.eyelid-bottom{position:absolute;width:110%;height:55%;background:#000;z-index:2;transition:transform 0.15s ease-in-out}
.eyelid-top{top:-2%;left:-5%;border-radius:0 0 50% 50%;transform:translateY(-100%)}
.eyelid-bottom{bottom:-2%;left:-5%;border-radius:50% 50% 0 0;transform:translateY(100%)}
.blink .eyelid-top{transform:translateY(0)!important}
.blink .eyelid-bottom{transform:translateY(0)!important}
.happy .iris{background:radial-gradient(circle at 35% 35%,#0f0,#00aa44);box-shadow:0 0 20px #0f0;transform:scale(1.15)}
.happy .eye,.happy.eye{border-color:#0f0;box-shadow:0 0 25px rgba(0,255,0,0.4)}
.sad .iris{transform:translateY(20%) scale(0.85)}
.sad .eye,.sad.eye{border-color:#66f;box-shadow:0 0 25px rgba(100,100,255,0.4)}
.sad .eyelid-top{transform:translateY(-60%)!important}
.angry .iris{background:radial-gradient(circle at 35% 35%,#f00,#aa0000);box-shadow:0 0 20px #f00;transform:scale(0.9)}
.angry .eye,.angry.eye{border-color:#f00;box-shadow:0 0 25px rgba(255,0,0,0.4)}
.angry .eyelid-top{transform:translateY(-55%) rotate(10deg)!important}
.eye:first-child.angry .eyelid-top,.angry .eye:first-child .eyelid-top{transform:translateY(-55%) rotate(-10deg)!important}
.surprised .iris{transform:scale(1.4)}
.surprised .pupil{transform:translate(-50%,-50%) scale(0.6)}
.surprised .eye,.surprised.eye{border-color:#ff0;box-shadow:0 0 25px rgba(255,255,0,0.4)}
.thinking .iris{transform:translateX(30%) translateY(-20%)}
.thinking .eye,.thinking.eye{border-color:#a0f;box-shadow:0 0 25px rgba(160,0,255,0.3)}
.sleepy .eyelid-top{transform:translateY(-40%)!important}
.sleepy .iris{transform:translateY(15%) scale(0.9)}
.sleepy .eye,.sleepy.eye{border-color:#446;box-shadow:0 0 10px rgba(50,50,100,0.3)}
.love .iris{background:radial-gradient(circle at 35% 35%,#f0a,#aa0055);box-shadow:0 0 20px #f0a;transform:scale(1.1)}
.love .eye,.love.eye{border-color:#f0a;box-shadow:0 0 25px rgba(255,0,170,0.4)}
.excited .iris{background:radial-gradient(circle at 35% 35%,#ff0,#ffaa00);box-shadow:0 0 25px #ff0;transform:scale(1.25)}
.excited .pupil{transform:translate(-50%,-50%) scale(0.7)}
.excited .eye,.excited.eye{border-color:#ff0;box-shadow:0 0 30px rgba(255,255,0,0.5);animation:excitedBounce 0.5s infinite alternate}
@keyframes excitedBounce{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}
.laughing .iris{background:radial-gradient(circle at 35% 35%,#0f0,#00cc44);box-shadow:0 0 20px #0f0;transform:scale(1.1)}
.laughing .eyelid-top{transform:translateY(-30%)!important}
.laughing .eyelid-bottom{transform:translateY(-30%)!important}
.laughing .eye,.laughing.eye{border-color:#0f0;box-shadow:0 0 25px rgba(0,255,0,0.4);animation:laughShake 0.15s infinite alternate}
@keyframes laughShake{0%{transform:rotate(-2deg)}100%{transform:rotate(2deg)}}
.worried .iris{transform:translateY(10%) scale(0.95)}
.worried .eye,.worried.eye{border-color:#fa0;box-shadow:0 0 20px rgba(255,170,0,0.4)}
.worried .eyelid-top{transform:translateY(-65%) rotate(5deg)!important}
.eye:first-child.worried .eyelid-top,.worried .eye:first-child .eyelid-top{transform:translateY(-65%) rotate(-5deg)!important}
.confused .iris{transform:translateX(20%) scale(1.05)}
.confused .eye,.confused.eye{border-color:#fa0;box-shadow:0 0 20px rgba(255,170,0,0.3)}
.eye:first-child.confused .iris{transform:translateX(-20%) translateY(-10%) scale(1.05)}
#mouth{margin-top:6vh;width:8vw;max-width:50px;height:2px;background:#0ff;border-radius:10px;transition:all 0.3s;box-shadow:0 0 10px rgba(0,255,255,0.5)}
.happy #mouth{width:14vw;height:2vw;max-height:12px;border-radius:0 0 50% 50%;background:#0f0;box-shadow:0 0 10px rgba(0,255,0,0.5)}
.sad #mouth{width:10vw;height:2vw;max-height:10px;border-radius:50% 50% 0 0;background:#66f;box-shadow:0 0 10px rgba(100,100,255,0.5)}
.angry #mouth{width:12vw;height:1vw;background:#f00;box-shadow:0 0 10px rgba(255,0,0,0.5)}
.surprised #mouth{width:6vw;height:6vw;max-width:35px;max-height:35px;border-radius:50%;background:transparent;border:2px solid #ff0;box-shadow:0 0 10px rgba(255,255,0,0.5)}
.excited #mouth{width:12vw;height:3vw;max-height:18px;border-radius:0 0 50% 50%;background:#ff0;box-shadow:0 0 15px rgba(255,255,0,0.5)}
.laughing #mouth{width:16vw;height:4vw;max-height:22px;border-radius:0 0 50% 50%;background:#0f0;box-shadow:0 0 15px rgba(0,255,0,0.5);animation:laughMouth 0.2s infinite alternate}
@keyframes laughMouth{0%{height:3vw}100%{height:5vw}}
.worried #mouth{width:8vw;height:1.5vw;border-radius:40%;background:#fa0;transform:rotate(-5deg)}
.confused #mouth{width:8vw;height:1.5vw;border-radius:40%;background:#fa0;transform:rotate(8deg)}
.love #mouth{width:12vw;height:2.5vw;max-height:14px;border-radius:0 0 50% 50%;background:#f0a;box-shadow:0 0 12px rgba(255,0,170,0.5)}
.speaking #mouth{animation:speak 0.3s infinite alternate}
@keyframes speak{0%{height:1vw;width:6vw}100%{height:4vw;width:10vw;border-radius:40%}}
#status{position:fixed;bottom:5vh;color:#0ff;font-size:3.5vw;opacity:0.7;text-align:center;padding:0 5vw;max-width:90%;text-shadow:0 0 10px rgba(0,255,255,0.5)}
#wake-status{position:fixed;top:3vh;right:3vw;font-size:2.5vw;padding:4px 12px;border-radius:20px;z-index:10}
.wake-on{background:rgba(0,255,0,0.15);color:#0f0;border:1px solid rgba(0,255,0,0.3)}
.wake-off{background:rgba(255,0,0,0.15);color:#f66;border:1px solid rgba(255,0,0,0.3)}
#listening-indicator{position:fixed;bottom:12vh;width:15vw;height:15vw;max-width:70px;max-height:70px;border-radius:50%;border:2px solid #f00;display:none;animation:pulse 1s infinite;background:rgba(255,0,0,0.1)}
@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.5}100%{transform:scale(1);opacity:1}}
#text-input-wrap{position:fixed;bottom:2vh;width:90%;max-width:400px;display:none;z-index:50}
#text-input{width:100%;padding:12px 16px;border:2px solid #0ff;border-radius:25px;background:rgba(0,20,20,0.9);color:#0ff;font-size:16px;outline:none}
#text-input::placeholder{color:rgba(0,255,255,0.4)}
#thinking-dots{display:none;position:fixed;bottom:18vh}
#thinking-dots span{display:inline-block;width:2vw;height:2vw;max-width:10px;max-height:10px;margin:0 1vw;background:#a0f;border-radius:50%;animation:dotPulse 1.4s infinite}
#thinking-dots span:nth-child(2){animation-delay:0.2s}
#thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(0.6);opacity:0.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="boot"><div id="boot-text">DIDO</div><div id="boot-sub">v1.1 — Iniciando sistemas...</div></div>
<div id="face">
<div id="wake-status" class="wake-off">● WAKE OFF</div>
<div id="eyes">
<div class="eye" id="eye-l"><div class="eyelid-top"></div><div class="iris"><div class="pupil"></div><div class="iris-glow"></div></div><div class="eyelid-bottom"></div></div>
<div class="eye" id="eye-r"><div class="eyelid-top"></div><div class="iris"><div class="pupil"></div><div class="iris-glow"></div></div><div class="eyelid-bottom"></div></div>
</div>
<div id="mouth"></div>
</div>
<div id="thinking-dots"><span></span><span></span><span></span></div>
<div id="listening-indicator"></div>
<div id="status">Di "Oye Dido" o tócame para hablar</div>
<div id="text-input-wrap"><input id="text-input" type="text" placeholder="Escribe algo a Dido..." autocomplete="off"></div>
<script>
var $=function(id){return document.getElementById(id)};
var face=$('face'),status=$('status'),eyes=[$('eye-l'),$('eye-r')];
var thinkDots=$('thinking-dots'),listenInd=$('listening-indicator');
var textWrap=$('text-input-wrap'),textIn=$('text-input');
var wakeStatus=$('wake-status');
var speaking=false,listening=false,wakeListening=false,wakeLock=null;
var longPressTimer=null,recognition=null,wakeRecognition=null,voices=[];
var WAKE_WORDS=['dido','oye dido','hey dido','ei dido','ey dido'];

setTimeout(function(){$('boot').style.opacity='0';setTimeout(function(){$('boot').style.display='none';face.style.display='flex';startBlink();startIdle();startWakeListener()},1000)},3500);

function requestWake(){try{if('wakeLock' in navigator){navigator.wakeLock.request('screen').then(function(w){wakeLock=w}).catch(function(){})}}catch(e){}}
requestWake();
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'){requestWake();if(!wakeListening)startWakeListener()}});

function goFull(){var d=document.documentElement;if(d.requestFullscreen)d.requestFullscreen();else if(d.webkitRequestFullscreen)d.webkitRequestFullscreen()}

function blink(){eyes.forEach(function(e){e.classList.add('blink')});setTimeout(function(){eyes.forEach(function(e){e.classList.remove('blink')})},150)}
function startBlink(){setInterval(function(){if(!speaking)blink()},3000+Math.random()*4000)}

function startIdle(){setInterval(function(){if(speaking||listening)return;var ir=document.querySelectorAll('.iris');var x=(Math.random()-0.5)*30,y=(Math.random()-0.5)*20;ir.forEach(function(i){i.style.transform='translate('+x+'%,'+y+'%)'});setTimeout(function(){ir.forEach(function(i){var cl=i.parentElement.classList;if(!cl.contains('thinking')&&!cl.contains('confused'))i.style.transform='translate(0,0)'})},1500)},4000+Math.random()*3000)}

var ALL_EXPR=['happy','sad','angry','surprised','thinking','sleepy','love','excited','worried','confused','laughing','neutral','speaking'];
function setExpression(expr){ALL_EXPR.forEach(function(x){face.classList.remove(x);eyes.forEach(function(e){e.classList.remove(x)})});if(expr&&expr!=='neutral'){face.classList.add(expr);eyes.forEach(function(e){e.classList.add(expr)})}}

function loadVoices(){voices=speechSynthesis.getVoices()}
speechSynthesis.onvoiceschanged=loadVoices;loadVoices();

function pickVoice(){if(!voices.length)voices=speechSynthesis.getVoices();var prefs=['Google español','Microsoft Pablo','Jorge','Carlos','Diego'];for(var p=0;p<prefs.length;p++){for(var v=0;v<voices.length;v++){if(voices[v].name.indexOf(prefs[p])>=0&&voices[v].lang.indexOf('es')===0)return voices[v]}}for(var v=0;v<voices.length;v++){if(voices[v].lang.indexOf('es')===0)return voices[v]}return null}

function speak(text,emotion){return new Promise(function(resolve){speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang='es-ES';u.rate=1.0;u.pitch=0.85;u.volume=1.0;var v=pickVoice();if(v)u.voice=v;speaking=true;setExpression(emotion||'happy');face.classList.add('speaking');status.textContent=text;u.onend=function(){speaking=false;face.classList.remove('speaking');setTimeout(function(){setExpression('neutral');status.textContent='Di "Oye Dido" o tocame';startWakeListener()},1500);resolve()};u.onerror=function(){speaking=false;face.classList.remove('speaking');setExpression('neutral');startWakeListener();resolve()};speechSynthesis.speak(u)})}

function initSTT(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){status.textContent='Sin soporte de voz. Toque largo para escribir.';return}recognition=new SR();recognition.lang='es-ES';recognition.continuous=false;recognition.interimResults=false;recognition.maxAlternatives=3;recognition.onresult=function(e){var t=e.results[0][0].transcript;stopListening();processInput(t)};recognition.onerror=function(e){stopListening();if(e.error!=='no-speech'&&e.error!=='aborted'){status.textContent='No te escuche. Di "Oye Dido" otra vez.';setExpression('confused');setTimeout(function(){setExpression('neutral');startWakeListener()},2000)}else{startWakeListener()}};recognition.onend=function(){if(listening)stopListening()}}
initSTT();

function startListening(){if(!recognition||speaking)return;stopWakeListener();try{listening=true;listenInd.style.display='block';setExpression('neutral');status.textContent='Te escucho...';recognition.start()}catch(e){stopListening();startWakeListener()}}
function stopListening(){listening=false;listenInd.style.display='none';try{recognition.stop()}catch(e){}}

function processInput(text){status.textContent='"'+text+'"';setExpression('thinking');thinkDots.style.display='block';fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})}).then(function(r){return r.json()}).then(function(data){thinkDots.style.display='none';speak(data.reply,data.emotion)}).catch(function(){thinkDots.style.display='none';speak('Algo fallo en mi conexion. Intenta de nuevo.','sad')})}

function initWakeListener(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;wakeRecognition=new SR();wakeRecognition.lang='es-ES';wakeRecognition.continuous=true;wakeRecognition.interimResults=true;wakeRecognition.maxAlternatives=5;wakeRecognition.onresult=function(e){for(var i=e.resultIndex;i<e.results.length;i++){var t=e.results[i][0].transcript.toLowerCase().trim();var wakeDetected=false;var command='';for(var w=0;w<WAKE_WORDS.length;w++){if(t.indexOf(WAKE_WORDS[w])>=0){wakeDetected=true;var idx=t.indexOf(WAKE_WORDS[w])+WAKE_WORDS[w].length;command=t.substring(idx).trim();break}}if(wakeDetected){stopWakeListener();setExpression('excited');blink();if(command.length>3&&e.results[i].isFinal){status.textContent='Escuche: "'+command+'"';processInput(command)}else{speak('Dime!','happy').then(function(){startListening()})}return}}};wakeRecognition.onerror=function(e){wakeListening=false;if(e.error==='not-allowed'){wakeStatus.className='wake-off';wakeStatus.textContent='● MIC OFF';status.textContent='Permiso de microfono denegado. Tocame para hablar.'}else if(e.error!=='aborted'&&e.error!=='no-speech'){setTimeout(function(){startWakeListener()},2000)}};wakeRecognition.onend=function(){if(wakeListening&&!listening&&!speaking){setTimeout(function(){if(!listening&&!speaking){try{wakeRecognition.start()}catch(e){setTimeout(function(){startWakeListener()},1000)}}},500)}}}
initWakeListener();

function startWakeListener(){if(!wakeRecognition||speaking||listening)return;try{stopWakeListener();setTimeout(function(){try{wakeListening=true;wakeRecognition.start();wakeStatus.className='wake-on';wakeStatus.textContent='● ESCUCHANDO';if(!speaking&&!listening)status.textContent='Di "Oye Dido" o tocame'}catch(e){wakeListening=false}},300)}catch(e){wakeListening=false}}

function stopWakeListener(){wakeListening=false;wakeStatus.className='wake-off';wakeStatus.textContent='● WAKE OFF';try{wakeRecognition.stop()}catch(e){}}

document.addEventListener('touchstart',function(e){if(e.target===textIn)return;goFull();longPressTimer=setTimeout(function(){textWrap.style.display=textWrap.style.display==='block'?'none':'block';if(textWrap.style.display==='block')textIn.focus();longPressTimer=null},800)},{passive:true});

document.addEventListener('touchend',function(e){if(e.target===textIn)return;if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;if(speaking){speechSynthesis.cancel();speaking=false;face.classList.remove('speaking');setExpression('neutral');status.textContent='Di "Oye Dido" o tocame';startWakeListener()}else if(!listening){stopWakeListener();startListening()}}},{passive:true});

textIn.addEventListener('keydown',function(e){if(e.key==='Enter'){var t=textIn.value.trim();if(t){textIn.value='';textWrap.style.display='none';stopWakeListener();processInput(t)}}});

document.addEventListener('click',function(e){if(e.target===textIn)return;if('ontouchstart' in window)return;goFull();if(speaking){speechSynthesis.cancel();speaking=false;face.classList.remove('speaking');setExpression('neutral');status.textContent='Di "Oye Dido" o tocame';startWakeListener()}else if(!listening){stopWakeListener();startListening()}});
</script>
</body>
</html>
