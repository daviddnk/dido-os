<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dido OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;touch-action:manipulation;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;user-select:none}

.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* === FONDO ANIMADO === */
.bg-glow{position:fixed;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(80,60,200,0.08) 0%,transparent 70%);animation:bgPulse 8s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes bgPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.8}}

/* === CARA === */
#face{position:relative;width:280px;height:200px;display:flex;align-items:center;justify-content:center;gap:60px;z-index:1;transition:all 0.8s cubic-bezier(0.4,0,0.2,1)}

/* === OJOS NUEVOS SUAVES === */
.eye{width:72px;height:72px;background:radial-gradient(circle at 40% 35%,#f0f0ff,#d0d0e8);border-radius:50%;position:relative;box-shadow:0 0 30px rgba(140,120,255,0.15),inset 0 -3px 8px rgba(0,0,0,0.1);transition:all 0.6s cubic-bezier(0.4,0,0.2,1);overflow:hidden}
.eye::before{content:'';position:absolute;top:8px;left:18px;width:18px;height:12px;background:rgba(255,255,255,0.7);border-radius:50%;filter:blur(2px);transition:all 0.6s ease;z-index:5}

/* === IRIS === */
.iris-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;transition:all 0.5s cubic-bezier(0.4,0,0.2,1)}
.iris{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 38% 35%,#a78bfa,#7c3aed 40%,#4c1d95 80%);position:relative;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);animation:irisBreath 4s ease-in-out infinite}
@keyframes irisBreath{0%,100%{box-shadow:0 0 12px rgba(139,92,246,0.3)}50%{box-shadow:0 0 20px rgba(139,92,246,0.5)}}

/* === PUPILA === */
.pupil{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:radial-gradient(circle at 35% 35%,#1a1a2e,#000);border-radius:50%;transition:all 0.4s cubic-bezier(0.4,0,0.2,1)}
.pupil::after{content:'';position:absolute;top:3px;left:4px;width:5px;height:5px;background:rgba(255,255,255,0.9);border-radius:50%;transition:all 0.3s ease}

/* === PARPADO === */
.eyelid{position:absolute;top:-2px;left:-2px;right:-2px;height:0%;background:linear-gradient(180deg,#0a0a0f 60%,rgba(10,10,15,0.8));border-radius:50% 50% 0 0;transition:height 0.15s ease;z-index:10}

/* === BLINK === */
.eye.blink .eyelid{height:105%;transition:height 0.08s ease}

/* === ESTADOS DE EXPRESION === */

/* Happy */
#face.happy .eye{border-radius:50% 50% 45% 45%;transform:scale(1.05)}
#face.happy .iris{background:radial-gradient(circle at 38% 35%,#c4b5fd,#8b5cf6 40%,#6d28d9 80%)}
#face.happy .eyelid{height:20%}

/* Sad */
#face.sad .eye{transform:scale(0.92) translateY(4px)}
#face.sad .iris{background:radial-gradient(circle at 38% 35%,#93c5fd,#3b82f6 40%,#1e40af 80%)}
#face.sad .eyelid{height:35%}
#face.sad .pupil{width:16px;height:16px}

/* Angry */
#face.angry .eye{transform:scale(1.08)}
#face.angry .iris{background:radial-gradient(circle at 38% 35%,#fca5a5,#ef4444 40%,#991b1b 80%)}
#face.angry .eyelid{height:40%}
#face.angry .pupil{width:10px;height:10px}
#face.angry .eye:first-child{transform:scale(1.08) rotate(-8deg)}
#face.angry .eye:last-child{transform:scale(1.08) rotate(8deg)}

/* Surprised */
#face.surprised .eye{width:82px;height:82px;transform:scale(1.1)}
#face.surprised .iris{background:radial-gradient(circle at 38% 35%,#fde68a,#f59e0b 40%,#b45309 80%)}
#face.surprised .pupil{width:8px;height:8px}

/* Thinking */
#face.thinking .eye:first-child .eyelid{height:30%}
#face.thinking .eye:last-child{transform:translateY(-6px)}
#face.thinking .iris{background:radial-gradient(circle at 38% 35%,#c4b5fd,#8b5cf6 40%,#5b21b6 80%)}
#face.thinking .iris-wrap{transform:translate(-30%,-50%)}

/* Sleepy */
#face.sleepy .eyelid{height:60%}
#face.sleepy .eye{transform:scale(0.9)}
#face.sleepy .iris{background:radial-gradient(circle at 38% 35%,#cbd5e1,#64748b 40%,#334155 80%)}

/* Love */
#face.love .iris{background:radial-gradient(circle at 38% 35%,#fda4af,#f43f5e 40%,#be123c 80%);animation:lovePulse 0.8s ease-in-out infinite}
#face.love .eye{box-shadow:0 0 30px rgba(244,63,94,0.3)}
@keyframes lovePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* Excited */
#face.excited .eye{transform:scale(1.1);animation:exciteBounce 0.5s ease infinite}
#face.excited .iris{background:radial-gradient(circle at 38% 35%,#fde68a,#f59e0b 40%,#d97706 80%)}
@keyframes exciteBounce{0%,100%{transform:scale(1.1) translateY(0)}50%{transform:scale(1.1) translateY(-4px)}}

/* Worried */
#face.worried .eye:first-child{transform:rotate(5deg) scale(0.95)}
#face.worried .eye:last-child{transform:rotate(-5deg) scale(0.95)}
#face.worried .iris{background:radial-gradient(circle at 38% 35%,#fdba74,#f97316 40%,#c2410c 80%)}
#face.worried .eyelid{height:25%}

/* Confused */
#face.confused .eye:first-child{transform:scale(1.05)}
#face.confused .eye:last-child{transform:scale(0.9) translateY(4px)}
#face.confused .iris{background:radial-gradient(circle at 38% 35%,#d8b4fe,#a855f7 40%,#7e22ce 80%)}

/* Laughing */
#face.laughing .eyelid{height:55%}
#face.laughing .eye{transform:scale(1.05);border-radius:50% 50% 40% 40%}
#face.laughing .iris{background:radial-gradient(circle at 38% 35%,#fde68a,#eab308 40%,#a16207 80%)}

/* Speaking */
#face.speaking .iris{animation:speakPulse 0.3s ease-in-out infinite alternate}
@keyframes speakPulse{0%{transform:scale(1)}100%{transform:scale(1.08)}}

/* === STATUS TEXT === */
#status{color:rgba(200,200,230,0.7);font-size:13px;text-align:center;max-width:85%;margin-top:30px;min-height:20px;line-height:1.5;z-index:1;transition:all 0.4s ease;letter-spacing:0.3px}

/* === THINKING DOTS === */
#thinking-dots{display:none;margin-top:15px;z-index:1}
#thinking-dots span{display:inline-block;width:8px;height:8px;margin:0 4px;background:#8b5cf6;border-radius:50%;animation:dotBounce 1.2s ease-in-out infinite}
#thinking-dots span:nth-child(2){animation-delay:0.15s}
#thinking-dots span:nth-child(3){animation-delay:0.3s}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-12px);opacity:1}}

/* === LISTENING INDICATOR === */
#listening-indicator{display:none;margin-top:12px;z-index:1}
.listen-wave{display:inline-block;width:3px;height:15px;margin:0 2px;background:linear-gradient(to top,#8b5cf6,#c4b5fd);border-radius:3px;animation:wave 0.8s ease-in-out infinite}
.listen-wave:nth-child(2){animation-delay:0.1s;height:22px}
.listen-wave:nth-child(3){animation-delay:0.2s;height:28px}
.listen-wave:nth-child(4){animation-delay:0.3s;height:22px}
.listen-wave:nth-child(5){animation-delay:0.4s;height:15px}
@keyframes wave{0%,100%{transform:scaleY(0.5);opacity:0.5}50%{transform:scaleY(1.2);opacity:1}}

/* === SELECTOR DE ACENTO === */
#accent-bar{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20;background:rgba(20,20,35,0.85);padding:6px 10px;border-radius:25px;backdrop-filter:blur(10px);border:1px solid rgba(139,92,246,0.15)}
.accent-btn{background:none;border:1px solid rgba(139,92,246,0.2);color:rgba(200,200,230,0.6);padding:5px 10px;border-radius:15px;font-size:11px;cursor:pointer;transition:all 0.3s ease;letter-spacing:0.3px}
.accent-btn.active{background:rgba(139,92,246,0.25);color:#c4b5fd;border-color:rgba(139,92,246,0.5);box-shadow:0 0 10px rgba(139,92,246,0.15)}
.accent-btn:hover{border-color:rgba(139,92,246,0.4)}

/* === TEXT INPUT === */
#text-input-wrap{display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:20;width:85%;max-width:350px}
#text-input{width:100%;padding:10px 15px;border-radius:20px;border:1px solid rgba(139,92,246,0.3);background:rgba(20,20,35,0.9);color:#e0e0f0;font-size:14px;outline:none;backdrop-filter:blur(10px)}
#text-input:focus{border-color:rgba(139,92,246,0.6);box-shadow:0 0 15px rgba(139,92,246,0.1)}
#text-input::placeholder{color:rgba(160,160,190,0.4)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container" id="container">
  <div id="face">
    <div class="eye" id="eye-l">
      <div class="eyelid"></div>
      <div class="iris-wrap"><div class="iris"><div class="pupil"></div></div></div>
    </div>
    <div class="eye" id="eye-r">
      <div class="eyelid"></div>
      <div class="iris-wrap"><div class="iris"><div class="pupil"></div></div></div>
    </div>
  </div>
  <p id="status"></p>
  <div id="thinking-dots"><span></span><span></span><span></span></div>
  <div id="listening-indicator">
    <span class="listen-wave"></span><span class="listen-wave"></span><span class="listen-wave"></span><span class="listen-wave"></span><span class="listen-wave"></span>
  </div>
  <div id="text-input-wrap"><input type="text" id="text-input" placeholder="Escribe aqui..."></div>
  <div id="accent-bar">
    <button class="accent-btn active" data-accent="cuba">🇨🇺 Cuba</button>
    <button class="accent-btn" data-accent="argentina">🇦🇷 Arg</button>
    <button class="accent-btn" data-accent="espana">🇪🇸 Esp</button>
    <button class="accent-btn" data-accent="colombia">🇨🇴 Col</button>
    <button class="accent-btn" data-accent="chile">🇨🇱 Chi</button>
  </div>
</div>
<script>
const face = document.getElementById('face');
const status = document.getElementById('status');
const thinkDots = document.getElementById('thinking-dots');
const listenInd = document.getElementById('listening-indicator');
const textInput = document.getElementById('text-input');
const textWrap = document.getElementById('text-input-wrap');

let currentAccent = 'cuba';
let isListening = false;
let isSpeaking = false;
let isProcessing = false;
let recognition = null;
let micLocked = false;
let speechQueue = [];

/* === ACCENT SELECTOR === */
document.querySelectorAll('.accent-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.accent-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentAccent = btn.dataset.accent;
    const names = {cuba:'Cubano',argentina:'Argentino',espana:'Español',colombia:'Colombiano',chile:'Chileno'};
    setStatus('Acento: ' + names[currentAccent]);
    setTimeout(() => setStatus(''), 2000);
  });
});

/* === VOICE CONFIG PER ACCENT === */
function getVoiceConfig(accent) {
  const configs = {
    cuba:      {lang:'es-CU', fallback:'es-MX', rate:1.05, pitch:1.05},
    argentina: {lang:'es-AR', fallback:'es-MX', rate:0.95, pitch:0.9},
    espana:    {lang:'es-ES', fallback:'es-ES', rate:1.0,  pitch:1.0},
    colombia:  {lang:'es-CO', fallback:'es-MX', rate:0.95, pitch:1.0},
    chile:     {lang:'es-CL', fallback:'es-MX', rate:1.0,  pitch:0.95}
  };
  return configs[accent] || configs['cuba'];
}

/* === PICK BEST VOICE === */
function pickVoice(config) {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  let v = voices.find(x => x.lang === config.lang);
  if (!v) v = voices.find(x => x.lang === config.fallback);
  if (!v) v = voices.find(x => x.lang.startsWith('es'));
  if (!v) v = voices[0];
  return v;
}

/* === IMPROVE TEXT FOR TTS === */
function prepareForSpeech(text) {
  let t = text;
  t = t.replace(/!/g, '. ');
  t = t.replace(/\?/g, '? ');
  t = t.replace(/\.\.\./g, ', ');
  t = t.replace(/\n/g, '. ');
  t = t.replace(/(\w)(a|e|i|o|u)(\s)/gi, '$1$2$3');
  return t.trim();
}

/* === SET EMOTION === */
function setEmotion(e) {
  const valid = ['happy','sad','angry','surprised','thinking','sleepy','love','excited','worried','confused','laughing','neutral','speaking'];
  face.className = '';
  if (valid.includes(e)) face.classList.add(e);
}

/* === SET STATUS === */
function setStatus(t) { status.textContent = t; }

/* === SHOW THINKING === */
function showThinking(show) {
  thinkDots.style.display = show ? 'block' : 'none';
  if (show) setEmotion('thinking');
}

/* === SHOW LISTENING === */
function showListening(show) {
  listenInd.style.display = show ? 'flex' : 'none';
}

/* === BLINK === */
function blink() {
  document.querySelectorAll('.eye').forEach(e => {
    e.classList.add('blink');
    setTimeout(() => e.classList.remove('blink'), 150);
  });
}
setInterval(() => {
  blink();
  if (Math.random() > 0.6) setTimeout(blink, 250);
}, 3000 + Math.random() * 2000);

/* === EYE TRACKING === */
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

function updateEyes() {
  document.querySelectorAll('.iris-wrap').forEach(iw => {
    const rect = iw.parentElement.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = mouseX - cx;
    const dy = mouseY - cy;
    const maxMove = 8;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const factor = Math.min(dist / 200, 1);
    const moveX = (dx / (dist || 1)) * maxMove * factor;
    const moveY = (dy / (dist || 1)) * maxMove * factor;
    iw.style.transform = 'translate(calc(-50% + ' + moveX + 'px), calc(-50% + ' + moveY + 'px))';
  });
  requestAnimationFrame(updateEyes);
}
updateEyes();

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => {
  if (e.touches.length > 0) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }
});

/* Random eye movement */
setInterval(() => {
  if (!isSpeaking && !isListening) {
    mouseX = window.innerWidth * (0.3 + Math.random() * 0.4);
    mouseY = window.innerHeight * (0.3 + Math.random() * 0.4);
  }
}, 4000 + Math.random() * 3000);

/* === SPEAK WITH TTS === */
function speak(text, emotion, callback) {
  if (isSpeaking) {
    speechQueue.push({text, emotion, callback});
    return;
  }
  isSpeaking = true;
  micLocked = true;
  stopListening();

  setEmotion('speaking');
  const prepared = prepareForSpeech(text);

  const utter = new SpeechSynthesisUtterance(prepared);
  const config = getVoiceConfig(currentAccent);
  const voice = pickVoice(config);
  if (voice) utter.voice = voice;
  utter.lang = config.lang;
  utter.rate = config.rate;
  utter.pitch = config.pitch;
  utter.volume = 1;

  utter.onend = () => {
    isSpeaking = false;
    setEmotion(emotion || 'happy');

    /* FIX MICROFONO: esperar 1.5s despues de hablar antes de abrir mic */
    setTimeout(() => {
      micLocked = false;
      if (speechQueue.length > 0) {
        const next = speechQueue.shift();
        speak(next.text, next.emotion, next.callback);
      } else {
        if (callback) callback();
        startListening();
      }
    }, 1500);
  };

  utter.onerror = () => {
    isSpeaking = false;
    setEmotion(emotion || 'happy');
    setTimeout(() => {
      micLocked = false;
      if (callback) callback();
      startListening();
    }, 1500);
  };

  speechSynthesis.cancel();
  setTimeout(() => speechSynthesis.speak(utter), 100);
}

/* === SEND TO BACKEND === */
async function sendMessage(text) {
  if (isProcessing || !text.trim()) return;
  isProcessing = true;
  stopListening();
  showThinking(true);
  setStatus('');

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: text, accent: currentAccent})
    });
    const data = await resp.json();
    showThinking(false);

    if (data.reply) {
      setStatus(data.reply);
      speak(data.reply, data.emotion || 'happy');
    } else {
      setStatus('Hmm no recibi respuesta');
      setEmotion('confused');
      setTimeout(() => startListening(), 2000);
    }
  } catch(e) {
    console.error('[DIDO] Error:', e);
    showThinking(false);
    setStatus('Error de conexion');
    setEmotion('worried');
    setTimeout(() => startListening(), 3000);
  }
  isProcessing = false;
}

/* === SPEECH RECOGNITION === */
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    textWrap.style.display = 'block';
    setStatus('Tu navegador no soporta voz. Usa el teclado.');
    return;
  }

  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    showListening(true);
    setStatus('Escuchando...');
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    console.log('[DIDO] Escuche: ' + text);
    isListening = false;
    showListening(false);
    setStatus('"' + text + '"');
    sendMessage(text);
  };

  recognition.onerror = (e) => {
    console.log('[DIDO] Mic error: ' + e.error);
    isListening = false;
    showListening(false);
    if (e.error === 'no-speech') {
      setStatus('No te escuche. Toca la pantalla para hablar.');
      setEmotion('neutral');
    } else if (e.error === 'not-allowed') {
      setStatus('Permite el microfono para hablar.');
      textWrap.style.display = 'block';
    }
  };

  recognition.onend = () => {
    isListening = false;
    showListening(false);
  };
}

function startListening() {
  if (micLocked || isSpeaking || isProcessing || isListening) return;
  if (!recognition) return;
  try {
    recognition.start();
  } catch(e) {
    console.log('[DIDO] Mic start error:', e);
  }
}

function stopListening() {
  if (!recognition) return;
  try {
    recognition.stop();
  } catch(e) {}
  isListening = false;
  showListening(false);
}

/* === TEXT INPUT === */
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && textInput.value.trim()) {
    const text = textInput.value.trim();
    textInput.value = '';
    sendMessage(text);
  }
});

/* === TAP TO TALK === */
document.getElementById('container').addEventListener('click', (e) => {
  if (e.target.closest('#accent-bar') || e.target.closest('#text-input-wrap')) return;
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    micLocked = false;
    setEmotion('neutral');
    setTimeout(() => startListening(), 500);
    return;
  }
  if (!isListening && !isProcessing) {
    startListening();
  }
});

/* === INIT === */
function init() {
  initRecognition();
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
  setEmotion('happy');
  setTimeout(() => {
    speak('Que bola! Soy Dido, tu asistente personal. Toca la pantalla y hablame.', 'happy');
  }, 1000);
}
window.addEventListener('load', init);
</script>
</body>
</html>
